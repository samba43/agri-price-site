<h2>Reset Password</h2>

  Enter your registered email address and we'll send you a password reset link.

  type="email"

```

  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const dbClient = window.supabase.createClient(
  'https://fiyumrqncvgwuczalgqc.supabase.co',
  'sb_publishable_XPNEWHWhX_tEMPKvGr63Qw_Ekm92Doz'
);

async function sendResetLink() {

  const email = document
    .getElementById('reset-email')
    .value
    .trim()
    .toLowerCase();

  const msg = document.getElementById('reset-msg');

  if(!email){
    msg.style.color = 'red';
    msg.textContent = 'Please enter your email.';
    return;
  }

  const { error } =
    await dbClient.auth.resetPasswordForEmail(
      email,
      {
        redirectTo:
          'https://samba43.github.io/agri-price-site/reset-password.html'
      }
    );

  if(error){
    msg.style.color = 'red';
    msg.textContent = error.message;
    return;
  }

  msg.style.color = 'green';
  msg.textContent =
    'Password reset link sent. Please check your email.';
}
</script>

</body>
