<!DOCTYPE html>
<html>
<head>
<title>Login - PureHarvest</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-logo">🌾 PureHarvest</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
  </div>
</nav>

<!-- LOGIN/SIGNUP FORM -->
<section class="auth-section">
  <div class="auth-box">

    <!-- TABS -->
    <div class="auth-tabs">
      <button class="tab-btn active" id="login-tab" onclick="showLogin()">Login</button>
      <button class="tab-btn" id="signup-tab" onclick="showSignup()">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <h2>Welcome Back! 🌾</h2>
      <input type="email" id="login-email" placeholder="Your Email"/><br/>
      <input type="password" id="login-password" placeholder="Your Password"/><br/>
      <button class="auth-btn" onclick="loginUser()">Login</button>
      <p id="login-msg" class="auth-msg"></p>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signup-form" style="display:none">
      <h2>Join PureHarvest! 🌱</h2>
      <input type="text" id="signup-name" placeholder="Your Full Name"/><br/>
      <input type="email" id="signup-email" placeholder="Your Email"/><br/>
      <input type="tel" id="signup-phone" placeholder="Your Phone Number"/><br/>
      <input type="text" id="signup-house" placeholder="House / Flat No"/><br/>
      <input type="text" id="signup-street" placeholder="Street / Area"/><br/>
      <input type="text" id="signup-city" placeholder="City"/><br/>
      <input type="text" id="signup-state" placeholder="State"/><br/>
      <input type="text" id="signup-pincode" placeholder="Pincode" maxlength="6"/><br/>
      <input type="password" id="signup-password" placeholder="Create Password"/><br/>
      <button class="auth-btn" onclick="signupUser()">Sign Up</button>
      <p id="signup-msg" class="auth-msg"></p>
    </div>

  </div>
</section>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const dbClient = window.supabase.createClient(
    'https://fiyumrqncvgwuczalgqc.supabase.co',
    'sb_publishable_XPNEWHWhX_tEMPKvGr63Qw_Ekm92Doz'
  );

  function showLogin() {
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('signup-form').style.display = 'none';
    document.getElementById('login-tab').classList.add('active');
    document.getElementById('signup-tab').classList.remove('active');
  }

  function showSignup() {
    document.getElementById('signup-form').style.display = 'block';
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('signup-tab').classList.add('active');
    document.getElementById('login-tab').classList.remove('active');
  }

  async function loginUser() {
    var email = document.getElementById('login-email').value;
    var password = document.getElementById('login-password').value;
    var msg = document.getElementById('login-msg');

    if(!email || !password) {
      msg.style.color = 'red';
      msg.textContent = 'Please fill all fields!';
      return;
    }

    const { data, error } = await dbClient.auth.signInWithPassword({
      email: email,
      password: password
    });

    if(error) {
      msg.style.color = 'red';
      msg.textContent = 'Wrong email or password!';
    } else {
      msg.style.color = 'green';
      msg.textContent = 'Login successful! Redirecting...';
      setTimeout(function() {
        window.location.href = 'profile.html';
      }, 1000);
    }
  }

  async function signupUser() {
    var name     = document.getElementById('signup-name').value.trim();
    var email    = document.getElementById('signup-email').value.trim();
    var phone    = document.getElementById('signup-phone').value.trim();
    var house    = document.getElementById('signup-house').value.trim();
    var street   = document.getElementById('signup-street').value.trim();
    var city     = document.getElementById('signup-city').value.trim();
    var state    = document.getElementById('signup-state').value.trim();
    var pincode  = document.getElementById('signup-pincode').value.trim();
    var password = document.getElementById('signup-password').value;
    var msg      = document.getElementById('signup-msg');

    if(!name || !email || !phone || !house || !street || !city || !state || !pincode || !password) {
      msg.style.color = 'red';
      msg.textContent = 'Please fill all fields!';
      return;
    }

    const { data, error } = await dbClient.auth.signUp({
      email: email,
      password: password
    });

    if(error) {
      msg.style.color = 'red';
      msg.textContent = error.message;
      return;
    }

    const { error: dbError } = await dbClient
      .from('users')
      .insert([{
        id: data.user.id,
        email: email,
        name: name,
        phone: phone,
        house: house,
        street: street,
        city: city,
        state: state,
        pincode: pincode,
        address: house + ', ' + street + ', ' + city + ', ' + state + ' - ' + pincode
      }]);

    if(dbError) {
      msg.style.color = 'red';
      msg.textContent = 'Error saving details! ' + dbError.message;
    } else {
      msg.style.color = 'green';
      msg.textContent = 'Account created! Redirecting...';
      setTimeout(function() {
        window.location.href = 'profile.html';
      }, 1000);
    }
  }

</script>

</body>
</html>
