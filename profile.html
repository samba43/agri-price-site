<!DOCTYPE html>
<html>
<head>
<title>My Profile - PureHarvest</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-logo">🌾 PureHarvest</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <button class="auth-btn-small" onclick="logoutUser()">Logout</button>
  </div>
</nav>

<!-- PROFILE SECTION -->
<section class="profile-section">
  <div class="profile-box">
    <div class="profile-avatar">👤</div>
    <h2 id="profile-name">Loading...</h2>
    <p id="profile-email" class="profile-email"></p>

    <!-- VIEW MODE -->
    <div id="view-mode">
      <div class="profile-details">
        <div class="profile-item">
          <span class="profile-label">📱 Phone</span>
          <span id="profile-phone" class="profile-value">-</span>
        </div>
        <div class="profile-item">
          <span class="profile-label">🏠 House / Flat No</span>
          <span id="profile-house" class="profile-value">-</span>
        </div>
        <div class="profile-item">
          <span class="profile-label">🛣️ Street / Area</span>
          <span id="profile-street" class="profile-value">-</span>
        </div>
        <div class="profile-item">
          <span class="profile-label">🏙️ City</span>
          <span id="profile-city" class="profile-value">-</span>
        </div>
        <div class="profile-item">
          <span class="profile-label">📍 State</span>
          <span id="profile-state" class="profile-value">-</span>
        </div>
        <div class="profile-item">
          <span class="profile-label">📮 Pincode</span>
          <span id="profile-pincode" class="profile-value">-</span>
        </div>
      </div>
      <button class="edit-btn" onclick="showEditMode()">✏️ Edit Profile</button>
      <button class="auth-btn" onclick="window.location.href='index.html'">🌾 Go Shopping</button>
    </div>

    <!-- EDIT MODE -->
    <div id="edit-mode" style="display:none">
      <input type="text" id="edit-name"    placeholder="Your Full Name"/><br/>
      <input type="tel"  id="edit-phone"   placeholder="Your Phone Number"/><br/>
      <input type="text" id="edit-house"   placeholder="House / Flat No"/><br/>
      <input type="text" id="edit-street"  placeholder="Street / Area"/><br/>
      <input type="text" id="edit-city"    placeholder="City"/><br/>
      <input type="text" id="edit-state"   placeholder="State"/><br/>
      <input type="text" id="edit-pincode" placeholder="Pincode" maxlength="6"/><br/>
      <button class="auth-btn" onclick="saveProfile()">💾 Save Changes</button>
      <button class="cancel-btn" onclick="hideEditMode()">✕ Cancel</button>
      <p id="edit-msg" class="auth-msg"></p>
    </div>

  </div>
</section>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const dbClient = window.supabase.createClient(
  'https://fiyumrqncvgwuczalgqc.supabase.co',
  'sb_publishable_XPNEWHWhX_tEMPKvGr63Qw_Ekm92Doz'
);

var currentUserId = null;

// Helper: parse a stored address string back into parts
// Format saved: "house, street, city, state - pincode"
function parseAddress(address) {
  var result = { house: '', street: '', city: '', state: '', pincode: '' };
  if (!address) return result;

  // Split off pincode first (after " - ")
  var parts = address.split(' - ');
  if (parts.length === 2) result.pincode = parts[1].trim();

  // Remaining: "house, street, city, state"
  var main = parts[0].split(',');
  if (main[0] !== undefined) result.house  = main[0].trim();
  if (main[1] !== undefined) result.street = main[1].trim();
  if (main[2] !== undefined) result.city   = main[2].trim();
  if (main[3] !== undefined) result.state  = main[3].trim();

  return result;
}

async function loadProfile() {
  const { data: { user } } = await dbClient.auth.getUser();

  if(!user) {
    window.location.href = 'login.html';
    return;
  }

  currentUserId = user.id;

  const { data, error } = await dbClient
    .from('users')
    .select('*')
    .eq('id', user.id)
    .single();

  if(data) {
    // VIEW MODE
    document.getElementById('profile-name').textContent    = data.name;
    document.getElementById('profile-email').textContent   = data.email;
    document.getElementById('profile-phone').textContent   = data.phone;
    document.getElementById('profile-house').textContent   = data.house   || '-';
    document.getElementById('profile-street').textContent  = data.street  || '-';
    document.getElementById('profile-city').textContent    = data.city    || '-';
    document.getElementById('profile-state').textContent   = data.state   || '-';
    document.getElementById('profile-pincode').textContent = data.pincode || '-';

    // PRE-FILL EDIT FORM
    document.getElementById('edit-name').value    = data.name;
    document.getElementById('edit-phone').value   = data.phone;
    document.getElementById('edit-house').value   = data.house   || '';
    document.getElementById('edit-street').value  = data.street  || '';
    document.getElementById('edit-city').value    = data.city    || '';
    document.getElementById('edit-state').value   = data.state   || '';
    document.getElementById('edit-pincode').value = data.pincode || '';
  }
}

async function saveProfile() {
  var name    = document.getElementById('edit-name').value.trim();
  var phone   = document.getElementById('edit-phone').value.trim();
  var house   = document.getElementById('edit-house').value.trim();
  var street  = document.getElementById('edit-street').value.trim();
  var city    = document.getElementById('edit-city').value.trim();
  var state   = document.getElementById('edit-state').value.trim();
  var pincode = document.getElementById('edit-pincode').value.trim();
  var msg     = document.getElementById('edit-msg');

  if(!name || !phone || !house || !street || !city || !state || !pincode) {
    msg.style.color = 'red';
    msg.textContent = 'Please fill all fields!';
    return;
  }

  var address = house + ', ' + street + ', ' + city + ', ' + state + ' - ' + pincode;

  const { error } = await dbClient
    .from('users')
    .update({ 
      name: name, 
      phone: phone, 
      house: house,
      street: street,
      city: city,
      state: state,
      pincode: pincode,
      address: address
    })
    .eq('id', currentUserId);

  if(error) {
    msg.style.color = 'red';
    msg.textContent = 'Error saving! Try again.';
  } else {
    document.getElementById('profile-name').textContent    = name;
    document.getElementById('profile-phone').textContent   = phone;
    document.getElementById('profile-house').textContent   = house;
    document.getElementById('profile-street').textContent  = street;
    document.getElementById('profile-city').textContent    = city;
    document.getElementById('profile-state').textContent   = state;
    document.getElementById('profile-pincode').textContent = pincode;

    msg.style.color = 'green';
    msg.textContent = 'Saved successfully!';
    setTimeout(function() {
      hideEditMode();
    }, 1000);
  }
}

async function logoutUser() {
  await dbClient.auth.signOut();
  window.location.href = 'index.html';
}

loadProfile();
</script>

</body>
</html>
