<!DOCTYPE html>
<html>
<head>
<title>My Profile - PureHarvest</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-logo">🌾 PureHarvest</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <button class="auth-btn-small" onclick="logoutUser()">Logout</button>
  </div>
</nav>

<!-- PROFILE SECTION -->
<section class="profile-section">
  <div class="profile-box">
    <div class="profile-avatar">👤</div>
    <h2 id="profile-name">Loading...</h2>
    <p id="profile-email" class="profile-email"></p>

    <!-- VIEW MODE -->
    <div id="view-mode">
      <div class="profile-details">
        <div class="profile-item">
          <span class="profile-label">📱 Phone</span>
          <span id="profile-phone" class="profile-value">-</span>
        </div>
        <div class="profile-item">
          <span class="profile-label">📍 Address</span>
          <span id="profile-address" class="profile-value">-</span>
        </div>
      </div>
      <button class="edit-btn" onclick="showEditMode()">✏️ Edit Profile</button>
      <button class="auth-btn" onclick="window.location.href='index.html'">🌾 Go Shopping</button>
    </div>

    <!-- EDIT MODE -->
    <div id="edit-mode" style="display:none">
      <input type="text" id="edit-name" placeholder="Your Full Name"/><br/>
      <input type="tel" id="edit-phone" placeholder="Your Phone Number"/><br/>
      <input type="text" id="edit-address" placeholder="Your Address"/><br/>
      <button class="auth-btn" onclick="saveProfile()">💾 Save Changes</button>
      <button class="cancel-btn" onclick="hideEditMode()">✕ Cancel</button>
      <p id="edit-msg" class="auth-msg"></p>
    </div>

  </div>
</section>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const dbClient = window.supabase.createClient(
  'https://fiyumrqncvgwuczalgqc.supabase.co',
  'sb_publishable_XPNEWHWhX_tEMPKvGr63Qw_Ekm92Doz'
);

var currentUserId = null;

async function loadProfile() {
  const { data: { user } } = await dbClient.auth.getUser();

  if(!user) {
    window.location.href = 'login.html';
    return;
  }

  currentUserId = user.id;

  const { data, error } = await dbClient
    .from('users')
    .select('*')
    .eq('id', user.id)
    .single();

  if(data) {
    document.getElementById('profile-name').textContent = data.name;
    document.getElementById('profile-email').textContent = data.email;
    document.getElementById('profile-phone').textContent = data.phone;
    document.getElementById('profile-address').textContent = data.address;

    // PRE FILL EDIT FORM
    document.getElementById('edit-name').value = data.name;
    document.getElementById('edit-phone').value = data.phone;
    document.getElementById('edit-address').value = data.address;
  }
}

function showEditMode() {
  document.getElementById('view-mode').style.display = 'none';
  document.getElementById('edit-mode').style.display = 'block';
}

function hideEditMode() {
  document.getElementById('edit-mode').style.display = 'none';
  document.getElementById('view-mode').style.display = 'block';
}

async function saveProfile() {
  var name = document.getElementById('edit-name').value;
  var phone = document.getElementById('edit-phone').value;
  var address = document.getElementById('edit-address').value;
  var msg = document.getElementById('edit-msg');

  if(!name || !phone || !address) {
    msg.style.color = 'red';
    msg.textContent = 'Please fill all fields!';
    return;
  }

  const { error } = await dbClient
    .from('users')
    .update({ name: name, phone: phone, address: address })
    .eq('id', currentUserId);

  if(error) {
    msg.style.color = 'red';
    msg.textContent = 'Error saving! Try again.';
  } else {
    document.getElementById('profile-name').textContent = name;
    document.getElementById('profile-phone').textContent = phone;
    document.getElementById('profile-address').textContent = address;
    msg.style.color = 'green';
    msg.textContent = 'Saved successfully!';
    setTimeout(function() {
      hideEditMode();
    }, 1000);
  }
}

async function logoutUser() {
  await dbClient.auth.signOut();
  window.location.href = 'index.html';
}

loadProfile();
</script>

</body>
</html>
