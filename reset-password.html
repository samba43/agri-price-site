<!DOCTYPE html>
<html>
<head>
<title>Reset Password - PureHarvest</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
</head>

<body>

<nav>
  <div class="nav-logo">PureHarvest</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
  </div>
</nav>

<section class="auth-section">
  <div class="auth-box">

    <h2>Create New Password</h2>

    <input
      type="password"
      id="new-password"
      placeholder="New Password"
    /><br/>

    <input
      type="password"
      id="confirm-password"
      placeholder="Confirm Password"
    /><br/>

    <button class="auth-btn" onclick="updatePassword()">
      Update Password
    </button>

    <p id="reset-msg" class="auth-msg"></p>

  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const dbClient = window.supabase.createClient(
  'https://fiyumrqncvgwuczalgqc.supabase.co',
  'sb_publishable_XPNEWHWhX_tEMPKvGr63Qw_Ekm92Doz'
);

async function updatePassword() {

  const password =
    document.getElementById('new-password').value;

  const confirmPassword =
    document.getElementById('confirm-password').value;

  const msg =
    document.getElementById('reset-msg');

  if(password.length < 8){
    msg.style.color = 'red';
    msg.textContent =
      'Password must be at least 8 characters.';
    return;
  }

  if(password !== confirmPassword){
    msg.style.color = 'red';
    msg.textContent =
      'Passwords do not match.';
    return;
  }

  const { error } =
    await dbClient.auth.updateUser({
      password: password
    });

  if(error){
    msg.style.color = 'red';
    msg.textContent = error.message;
    return;
  }

  msg.style.color = 'green';
  msg.textContent =
    'Password updated successfully! Redirecting...';

  setTimeout(() => {
    window.location.href = 'login.html';
  }, 2000);
}
</script>

</body>
</html>
